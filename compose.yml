# ============================================================
# airis-monorepo - Local Development
# ============================================================
# Generated by `airis gen` - DO NOT EDIT MANUALLY
# Source of truth: manifest.toml
#
# airis up = local development only (always hot-reload).
# Production deploys via GitOps - this file is never used there.
# ============================================================

x-app-base: &app-base
  image: airis-monorepo-base
  working_dir: /app
  deploy:
    replicas: 1
  volumes:
    - ./:/app:delegated
    - workspace-node-modules:/app/node_modules
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    DOCKER_ENV: "true"
    NODE_ENV: development
    PNPM_HOME: /pnpm
    PNPM_STORE_DIR: /pnpm/store
    CHOKIDAR_USEPOLLING: "true"
    WATCHPACK_POLLING: "true"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"


networks:
  default:
    name: airis-monorepo_default
    external: false
  traefik:
    name: traefik_default
    external: true

volumes:
  workspace-node-modules:
