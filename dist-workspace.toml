[workspace]
members = ["cargo:."]

# === MAINTENANCE NOTE ===
# `.github/workflows/release.yml` has a hand-applied customization in the
# `publish-homebrew-formula` job: it mints a GitHub App installation token
# (HOMEBREW_TAP_APP_ID / HOMEBREW_TAP_APP_PRIVATE_KEY) instead of using
# the static PAT (HOMEBREW_TAP_TOKEN) that cargo-dist's template hard-codes.
# After running `dist init` or `dist generate`, re-apply that diff —
# search for the "MANUAL CUSTOMIZATION" marker in release.yml.

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# `release.yml` has a hand-applied diff (publish-homebrew-formula uses
# a GitHub App token instead of a static PAT). Tell `dist plan/build`
# this is intentional so it does not error on out-of-date generated CI.
allow-dirty = ["ci"]
# A GitHub repo to push Homebrew formulas to
tap = "agiletec-inc/homebrew-tap"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
