# Evidence Script - GPU Worker Service
# Run with: docker compose -f apps/evidence-script/compose.yaml up

name: evidence-script

services:
  worker:
    container_name: evidence-script-worker
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - DEVICE=cuda
      - COMPUTE_TYPE=float16
    volumes:
      - ./worker:/app
      - evidence-script-data:/data
      - evidence-script-cache:/home/worker/.cache
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

volumes:
  evidence-script-data:
  evidence-script-cache:
