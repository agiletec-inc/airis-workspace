version = 1
mode = "docker-first"

[workspace]
name = "focus-today"
package_manager = "pnpm@10.23.0"
service = "workspace"
image = "node:24-bookworm"
workdir = "/app"
volumes = [
    "node_modules:/app/node_modules",
    "next_build:/app/.next",
    "swc_cache:/app/.swc",
    "cache_dir:/app/.cache",
]

[workspace.clean]
dirs = [".next", ".swc", ".cache"]
recursive = ["node_modules"]

[catalog]

[workspaces]
apps = []
libs = []

[dev]
apps = []
autostart = ["focustoday"]

[[dev.urls.apps]]
name = "Focus Today"
url = "http://localhost:3000"

[apps.focustoday]
path = "."
type = "nextjs"

[docker]
baseImage = "node:24-bookworm"
workdir = "/app"

[docker.workspace]
service = "workspace"
volumes = ["node_modules"]

[service]

[rule.verify]
commands = ["airis lint", "airis typecheck"]

[packages]
workspaces = []
app = []

[packages.catalog]
next = "latest"
react = "latest"
react-dom = "latest"
typescript = "latest"
"@types/node" = "latest"
"@types/react" = "latest"
"@types/react-dom" = "latest"
tailwindcss = "latest"
"@tailwindcss/postcss" = "latest"
zod = "latest"
"lucide-react" = "latest"

[packages.root.dependencies]
"@ai-sdk/anthropic" = "^3.0.36"
"@ai-sdk/openai" = "^3.0.25"
"@ai-sdk/react" = "^3.0.71"
"@dnd-kit/core" = "^6.3.1"
"@dnd-kit/sortable" = "^10.0.0"
"@dnd-kit/utilities" = "^3.2.2"
"@supabase/ssr" = "^0.8.0"
"@supabase/supabase-js" = "^2.94.0"
ai = "^6.0.69"
"class-variance-authority" = "^0.7.1"
clsx = "^2.1.1"
cmdk = "^1.1.1"
"date-fns" = "^4.1.0"
"lucide-react" = "catalog:"
next = "catalog:"
"radix-ui" = "^1.4.3"
react = "catalog:"
"react-dom" = "catalog:"
swr = "^2.4.0"
"tailwind-merge" = "^3.4.0"
zod = "catalog:"
zustand = "^5.0.11"

[packages.root.devDependencies]
"@tailwindcss/postcss" = "catalog:"
"@types/node" = "catalog:"
"@types/react" = "catalog:"
"@types/react-dom" = "catalog:"
eslint = "^9"
"eslint-config-next" = "16.1.6"
tailwindcss = "catalog:"
"tw-animate-css" = "^1.4.0"
typescript = "catalog:"

[packages.root.scripts]
dev = "next dev --turbopack"
build = "next build"
start = "next start"
lint = "eslint"
typecheck = "tsc --noEmit"

[packages.root.engines]
node = ">=22.0.0"
pnpm = ">=10.15.0"

[guards]
deny = ["npm", "yarn", "npx"]
forbid = []
danger = []

[guards.wrap]
pnpm = "docker compose exec workspace pnpm"

[guards.deny_with_message]
"docker-compose" = "Use 'docker compose' (with space) or 'airis up' instead."

[orchestration]

[commands]
shell = "docker compose exec workspace bash"
install = "docker compose exec workspace pnpm install"
dev = "docker compose exec workspace pnpm run dev"
build = "docker compose exec workspace pnpm build"
test = "docker compose exec workspace pnpm test"
lint = "docker compose exec workspace pnpm lint"
typecheck = "docker compose exec workspace pnpm typecheck"

[remap]

[versioning]
strategy = "manual"
source = "0.1.0"

[docs]
targets = []
mode = "warn"

[ci]
enabled = false
auto_version = false

[ci.auto_merge]
enabled = false
from = "develop"
to = "main"

[templates.api]
[templates.web]
[templates.lib]

[runtimes.alias]
