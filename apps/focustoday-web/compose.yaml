# focus-today Workspace - Monorepo Dev Shell
# Run with: docker compose -f apps/focustoday-web/compose.yaml up

name: focus-today

services:
  workspace:
    container_name: focus-today-workspace
    build:
      context: ../..
      dockerfile: apps/focustoday-web/Dockerfile
      target: ${COMPOSE_TARGET:-dev}
    volumes:
      # Source code: :delegated for macOS I/O optimization
      - ../../:/app:delegated
      # Dependencies & build: named volumes for isolation
      - node_modules:/app/node_modules
      - next_build:/app/apps/focustoday-web/.next
      - swc_cache:/app/.swc
      - cache_dir:/app/.cache
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "200"
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sleep infinity
    networks:
      - default
    labels:
      - "traefik.enable=false"
    develop:
      watch:
        - path: .
          action: sync
          target: /app
          ignore:
            - node_modules/
            - .next/
            - dist/
            - .turbo/

networks:
  default:
    name: focus-today_default
    external: false

volumes:
  node_modules:
  next_build:
  swc_cache:
  cache_dir:
