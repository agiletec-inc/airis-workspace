version = 1
mode = "docker-first"

[project]
id = "airis-workspace"
binary_name = "airis"
description = "Docker-first monorepo workspace manager for rapid prototyping"
rust_edition = "2024"

[workspace]
name = "airis-workspace"
package_manager = "pnpm@10"
image = "node:22-alpine"

[stack.rust]
artifacts = ["target"]
verify = ["cargo clippy -- -D warnings", "cargo fmt --check", "cargo test"]

[[app]]
name = "airis"
path = "."
use = "rust"

[orchestration.dev]
workspace = "compose.yaml"

[commands]
up = "docker compose up -d"
down = "docker compose down"
build = "cargo build --release"
test = "cargo test"
lint = "cargo clippy -- -D warnings"
format = "cargo fmt --check"
verify = "airis verify"

[rule.verify]
commands = ["cargo check"]

[guards]
deny = []
# wrap = { pnpm = "docker compose exec workspace pnpm" }

[versioning]
strategy = "conventional-commits"
source = "VERSION"
sync_targets = ["Cargo.toml", "package.json", "npm/*/package.json"]

[docs]
sources = [
    "docs/ai/PROJECT_RULES.md",
    "docs/ai/WORKFLOW.md",
    "docs/ai/REVIEW.md",
    "docs/ai/STACK.md",
]
vendors = ["claude"]
