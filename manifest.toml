version = 1
mode = "docker-first"

[project]
id = "airis-monorepo"
binary_name = "airis"
# version is managed by git tags only - Cargo.toml is synced via airis init
description = "Docker-first monorepo workspace manager for rapid prototyping"
authors = ["Agile Technology <hello@agiletec.jp>"]
license = "MIT"
homepage = "https://github.com/agiletec-inc/airis-monorepo"
repository = "https://github.com/agiletec-inc/airis-monorepo"
keywords = [
    "monorepo",
    "docker",
    "workspace",
    "cli",
    "prototyping",
]
categories = [
    "command-line-utilities",
    "development-tools",
]
rust_edition = "2024"

[workspace]
name = "airis-monorepo"
package_manager = "pnpm@10.22.0"
service = "workspace"
image = "node:22-alpine"
workdir = "/app"
volumes = ["workspace-node-modules:/app/node_modules"]

[catalog]

[workspaces]
apps = []
libs = []

[dev]
apps = []
autostart = []

# REMOVED: [apps.*], [libs.*] - pnpm workspace auto-detects from apps/*, libs/*
# Use MCP /airis:init for scaffolding new apps/libs

[docker]
baseImage = "node:24-bookworm"
workdir = "/app"

[docker.workspace]
service = "workspace"
volumes = ["node_modules"]

[just]
output = "justfile"
features = [
    "docker-first-guard",
    "type-specific-commands",
]

[service.postgres]
image = "postgres:16-alpine"
port = 5432
volumes = []

[service.postgres.env]

[service.redis]
image = "redis:7-alpine"
port = 6379
volumes = []

[service.redis.env]

[rule.verify]
commands = [
    "just lint",
    "just test-all",
]

[rule.ci]
commands = [
    "just lint",
    "just test-all",
    "just typecheck",
]

[packages]
workspaces = [
    "apps/*",
    "libs/*",
    "packages/*",
]
app = []

[packages.catalog]
react = "latest"
next = "latest"
typescript = "latest"
tailwindcss = "latest"
hono = "latest"
drizzle-orm = "latest"
zod = "latest"
vitest = "latest"
playwright = "latest"
eslint = "latest"
prettier = "latest"

[packages.catalog.react-dom]
follow = "react"

[packages.catalog.react-is]
follow = "react"

[packages.root.dependencies]

[packages.root.devDependencies]

[packages.root.optionalDependencies]

[packages.root.scripts]
dev = "echo 'Run: just dev-<app-name>'"
build = "echo 'Run: just build-<app-name>'"
lint = "echo 'Run: just lint'"
test = "echo 'Run: just test'"

[packages.root.engines]

[packages.root.pnpm]
onlyBuiltDependencies = []

[packages.root.pnpm.overrides]

[packages.root.pnpm.peerDependencyRules]
ignoreMissing = []

[packages.root.pnpm.peerDependencyRules.allowedVersions]

[packages.root.pnpm.allowedScripts]

[guards]
deny = [
    "npm",
    "yarn",
    "pnpm",
    "bun",
]
forbid = [
    "npm",
    "yarn",
    "pnpm",
    "docker",
    "docker-compose",
]
danger = [
    "rm -rf /",
    "chmod -R 777",
    "chown -R",
]

[guards.wrap]

[guards.deny_with_message]

# REMOVED: [[app]] - use MCP /airis:init for scaffolding

[orchestration.dev]
workspace = "workspace/docker-compose.yml"
supabase = [
    "supabase/docker-compose.yml",
    "supabase/docker-compose.override.yml",
]
traefik = "traefik/docker-compose.yml"

[commands]
install = "docker compose exec workspace pnpm install"
up = "docker compose up -d"
down = "docker compose down"
shell = "docker compose exec workspace bash"
dev = "echo '🚀 Starting dev servers...'; docker compose exec workspace pnpm run dev"
build = "docker compose exec workspace pnpm build"
test = "docker compose exec workspace pnpm test"
lint = "docker compose exec workspace pnpm lint"
clean = "echo '🧹 Cleaning build artifacts...'; find . -type d -name 'node_modules' -o -name 'dist' -o -name '.next' -o -name 'build' | xargs rm -rf"

[remap]
"npm install" = "airis install"
"pnpm install" = "airis install"
"yarn install" = "airis install"
"npm run dev" = "airis dev"
"pnpm dev" = "airis dev"
"docker compose up" = "airis up"
"docker compose up -d" = "airis up"
"docker compose down" = "airis down"
"docker exec" = "airis shell"

[versioning]
strategy = "auto"
# source is git tags - no manual version needed here

[docs]
targets = []
mode = "warn"

[ci]
enabled = true
auto_version = true

[ci.auto_merge]
enabled = true
from = "next"
to = "main"
