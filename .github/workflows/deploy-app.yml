name: Deploy App (Reusable)

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      app_dir:
        required: true
        type: string
      parent_dir:
        required: true
        type: string
      environment:
        required: true
        type: string
      env_suffix:
        required: true
        type: string
      domain_suffix:
        required: true
        type: string

env:
  PROJECT_PREFIX: ${{ vars.PROJECT_PREFIX || 'agiletec' }}
  CONTAINER_NAME: ${{ vars.PROJECT_PREFIX || 'agiletec' }}-${{ inputs.env_suffix }}-${{ inputs.app_name }}
  IMAGE_TAG: ${{ vars.PROJECT_PREFIX || 'agiletec' }}-${{ inputs.app_name }}:${{ inputs.env_suffix }}-${{ github.sha }}
  DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
  HEALTHCHECK_RETRIES: ${{ vars.HEALTHCHECK_RETRIES || '10' }}
  HEALTHCHECK_INTERVAL: ${{ vars.HEALTHCHECK_INTERVAL || '5' }}

jobs:
  deploy:
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Doppler CLI → .env file
      # ----------------------------------------------------------------
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch environment variables
        run: |
          if [[ "${{ inputs.env_suffix }}" == "prd" ]]; then
            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_PRD }}"
          else
            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_STG }}"
          fi
          DOPPLER_TOKEN="$DOPPLER_TOKEN" doppler secrets download \
            --project "${{ inputs.app_name }}" \
            --config "${{ inputs.env_suffix }}" \
            --format env-no-quotes \
            --no-file > /tmp/doppler-${{ inputs.app_name }}.env

      # ----------------------------------------------------------------
      # 3. Docker build (production target)
      # ----------------------------------------------------------------
      - name: Build production image
        run: |
          docker build \
            --target production \
            --tag "$IMAGE_TAG" \
            --file "${{ inputs.app_dir }}/Dockerfile" \
            .

      # ----------------------------------------------------------------
      # 4. Transfer image to deploy host
      # ----------------------------------------------------------------
      - name: Transfer image
        run: |
          docker save "$IMAGE_TAG" | \
            ssh -o StrictHostKeyChecking=no \
              -i <(echo "${{ secrets.DEPLOY_SSH_KEY }}") \
              "${{ secrets.DEPLOY_USER }}@${DEPLOY_HOST}" \
              'docker load'

      # ----------------------------------------------------------------
      # 5. Transfer env file to deploy host
      # ----------------------------------------------------------------
      - name: Transfer env file
        run: |
          scp -o StrictHostKeyChecking=no \
            -i <(echo "${{ secrets.DEPLOY_SSH_KEY }}") \
            /tmp/doppler-${{ inputs.app_name }}.env \
            "${{ secrets.DEPLOY_USER }}@${DEPLOY_HOST}:/tmp/doppler-${{ inputs.app_name }}.env"

      # ----------------------------------------------------------------
      # 6-9. Deploy on remote host (stop → run → healthcheck → rollback)
      # ----------------------------------------------------------------
      - name: Deploy container
        id: deploy
        run: |
          ssh -o StrictHostKeyChecking=no \
            -i <(echo "${{ secrets.DEPLOY_SSH_KEY }}") \
            "${{ secrets.DEPLOY_USER }}@${DEPLOY_HOST}" \
            bash -s <<DEPLOY_SCRIPT
          set -euo pipefail
          trap "rm -f /tmp/doppler-${{ inputs.app_name }}.env" EXIT

          CONTAINER="${{ env.CONTAINER_NAME }}"
          IMAGE="${{ env.IMAGE_TAG }}"
          ROUTER_NAME="${{ inputs.app_name }}-${{ inputs.env_suffix }}"
          DOMAIN="${{ inputs.app_name }}.${{ inputs.domain_suffix }}"

          # Record old image for rollback
          OLD_IMAGE=""
          if docker inspect "\$CONTAINER" >/dev/null 2>&1; then
            OLD_IMAGE=\$(docker inspect --format='{{.Image}}' "\$CONTAINER" || true)
            echo "Old image: \$OLD_IMAGE"
            docker stop "\$CONTAINER" || true
            docker rm "\$CONTAINER" || true
          fi

          # Start new container
          docker run -d \
            --name "\$CONTAINER" \
            --network traefik-net \
            --restart unless-stopped \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.\${ROUTER_NAME}.rule=Host(\\\`\${DOMAIN}\\\`)" \
            --label "traefik.http.routers.\${ROUTER_NAME}.entrypoints=websecure" \
            --label "traefik.http.routers.\${ROUTER_NAME}.tls=true" \
            --label "traefik.http.services.\${ROUTER_NAME}.loadbalancer.server.port=3000" \
            --env-file /tmp/doppler-${{ inputs.app_name }}.env \
            "\$IMAGE"

          # Healthcheck with retries
          RETRIES=${{ env.HEALTHCHECK_RETRIES }}
          INTERVAL=${{ env.HEALTHCHECK_INTERVAL }}
          echo "Waiting for container to be healthy (max \${RETRIES}x\${INTERVAL}s)..."

          healthy=false
          for i in \$(seq 1 "\$RETRIES"); do
            sleep "\$INTERVAL"
            STATUS=\$(docker inspect --format='{{.State.Status}}' "\$CONTAINER" 2>/dev/null || echo "missing")
            if [[ "\$STATUS" == "running" ]]; then
              # Check if container responds on port 3000
              if docker exec "\$CONTAINER" curl -sf http://localhost:3000/ >/dev/null 2>&1 || \
                 docker exec "\$CONTAINER" wget -q --spider http://localhost:3000/ 2>/dev/null; then
                echo "Container healthy after \${i} checks."
                healthy=true
                break
              fi
            elif [[ "\$STATUS" == "exited" || "\$STATUS" == "dead" ]]; then
              echo "Container exited prematurely."
              docker logs --tail 50 "\$CONTAINER" || true
              break
            fi
            echo "Check \${i}/\${RETRIES}: status=\${STATUS}, waiting..."
          done

          if [[ "\$healthy" != "true" ]]; then
            echo "::error::Healthcheck failed for \$CONTAINER"
            docker logs --tail 100 "\$CONTAINER" || true

            # Rollback to old image
            if [[ -n "\$OLD_IMAGE" ]]; then
              echo "Rolling back to old image: \$OLD_IMAGE"
              docker stop "\$CONTAINER" || true
              docker rm "\$CONTAINER" || true
              docker run -d \
                --name "\$CONTAINER" \
                --network traefik-net \
                --restart unless-stopped \
                --label "traefik.enable=true" \
                --label "traefik.http.routers.\${ROUTER_NAME}.rule=Host(\\\`\${DOMAIN}\\\`)" \
                --label "traefik.http.routers.\${ROUTER_NAME}.entrypoints=websecure" \
                --label "traefik.http.routers.\${ROUTER_NAME}.tls=true" \
                --label "traefik.http.services.\${ROUTER_NAME}.loadbalancer.server.port=3000" \
                --env-file /tmp/doppler-${{ inputs.app_name }}.env \
                "\$OLD_IMAGE"
              echo "Rollback complete."
            fi
            exit 1
          fi

          echo "Deploy successful: \$CONTAINER (\$DOMAIN)"
          DEPLOY_SCRIPT

      # ----------------------------------------------------------------
      # 10. Cleanup (always runs)
      # ----------------------------------------------------------------
      - name: Cleanup runner
        if: always()
        run: |
          rm -f /tmp/doppler-${{ inputs.app_name }}.env
