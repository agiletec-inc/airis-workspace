name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: macos
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            os: macos
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            cross: true
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            archive: zip
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Version from Cargo.toml: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Will create release v${{ steps.version.outputs.version }}"
          fi

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build release binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/airis"
          if [ "${{ matrix.cross }}" = "true" ]; then
            aarch64-linux-gnu-strip "$BINARY"
          else
            strip "$BINARY"
          fi

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE="airis-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" airis
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          ARCHIVE="airis-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip"
          cd "target/${{ matrix.target }}/release"
          7z a "../../../$ARCHIVE" airis.exe
          cd ../../..
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: airis-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        if: steps.check_tag.outputs.exists == 'false'
        working-directory: artifacts
        run: |
          sha256sum airis-* > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Create version tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --generate-notes \
            artifacts/airis-* \
            SHA256SUMS.txt

      - name: Publish to crates.io
        if: steps.check_tag.outputs.exists == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify --allow-dirty

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if npm version already published
        id: check_npm
        run: |
          if npm view "@agiletec-inc/airis@${{ steps.version.outputs.version }}" version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "npm version ${{ steps.version.outputs.version }} already published"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check_npm.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        if: steps.check_npm.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Sync npm package versions
        if: steps.check_npm.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for pkg in npm/*/package.json; do
            tmp=$(mktemp)
            jq --arg v "$VERSION" '.version = $v' "$pkg" > "$tmp" && mv "$tmp" "$pkg"
          done
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.optionalDependencies |= with_entries(.value = $v)' npm/airis/package.json > "$tmp" && mv "$tmp" npm/airis/package.json

      - name: Place binaries into npm packages
        if: steps.check_npm.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ls artifacts/

          # Extract and place each platform binary
          mkdir -p npm/airis-darwin-arm64/bin
          tar -xzf "artifacts/airis-${VERSION}-aarch64-apple-darwin.tar.gz" -C npm/airis-darwin-arm64/bin
          chmod +x npm/airis-darwin-arm64/bin/airis

          mkdir -p npm/airis-darwin-x64/bin
          tar -xzf "artifacts/airis-${VERSION}-x86_64-apple-darwin.tar.gz" -C npm/airis-darwin-x64/bin
          chmod +x npm/airis-darwin-x64/bin/airis

          mkdir -p npm/airis-linux-x64/bin
          tar -xzf "artifacts/airis-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" -C npm/airis-linux-x64/bin
          chmod +x npm/airis-linux-x64/bin/airis

          mkdir -p npm/airis-linux-arm64/bin
          tar -xzf "artifacts/airis-${VERSION}-aarch64-unknown-linux-gnu.tar.gz" -C npm/airis-linux-arm64/bin
          chmod +x npm/airis-linux-arm64/bin/airis

          mkdir -p npm/airis-win32-x64/bin
          cd artifacts && 7z x "airis-${VERSION}-x86_64-pc-windows-msvc.zip" -o../npm/airis-win32-x64/bin && cd ..

      - name: Publish platform packages
        if: steps.check_npm.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in airis-darwin-arm64 airis-darwin-x64 airis-linux-arm64 airis-linux-x64 airis-win32-x64; do
            echo "Publishing @agiletec-inc/${pkg}..."
            cd "npm/${pkg}"
            npm publish --access public
            cd ../..
          done

      - name: Publish main package
        if: steps.check_npm.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/airis
          npm publish --access public
