name: Publish to crates.io

# cargo-dist owns the GitHub Releases + Homebrew tap pipeline (release.yml).
# crates.io publication is intentionally a sibling workflow because cargo-dist
# does not have a built-in crates.io publish-job. Both workflows are triggered
# by the same `v*` tag, so a single tag push fans out to all distribution
# channels (release artifacts, Homebrew tap, crates.io, cargo-binstall).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "Publishing airis-workspace v$CARGO_VERSION"

      - name: Skip if already published
        id: check
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          UA="airis-workspace-release (+https://github.com/agiletec-inc/airis-workspace)"
          RESPONSE=$(curl -sf -A "$UA" "https://crates.io/api/v1/crates/airis-workspace" || true)
          if [ -z "$RESPONSE" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if printf '%s' "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); v='$VERSION'; sys.exit(0 if any(x['num']==v for x in d.get('versions',[])) else 1)" 2>/dev/null; then
            echo "Version $VERSION already published — skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to crates.io
        if: steps.check.outputs.should_publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
