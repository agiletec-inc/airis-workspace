name: Deploy

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Job 1: Discover changed projects
  # ------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_targets: ${{ steps.discover.outputs.has_targets }}
      environment: ${{ steps.env.outputs.environment }}
      env_suffix: ${{ steps.env.outputs.env_suffix }}
      domain_suffix: ${{ steps.env.outputs.domain_suffix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "env_suffix=prd" >> "$GITHUB_OUTPUT"
            echo "domain_suffix=${{ vars.BASE_DOMAIN }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "env_suffix=stg" >> "$GITHUB_OUTPUT"
            echo "domain_suffix=stg.${{ vars.BASE_DOMAIN }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Discover changed projects
        id: discover
        run: |
          BASE_SHA="${{ github.event.before }}"
          # On first push or force-push, before may be all zeros
          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA=""
          fi
          bash .github/scripts/discover-projects.sh "$BASE_SHA" "${{ github.sha }}" "${{ steps.env.outputs.env_suffix }}"

  # ------------------------------------------------------------------
  # Job 2: Deploy each app in parallel
  # ------------------------------------------------------------------
  deploy:
    needs: discover
    if: needs.discover.outputs.has_targets == 'true'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: ${{ matrix.project.name }}
      app_dir: ${{ matrix.project.dir }}
      parent_dir: ${{ matrix.project.parent_dir }}
      environment: ${{ needs.discover.outputs.environment }}
      env_suffix: ${{ needs.discover.outputs.env_suffix }}
      domain_suffix: ${{ needs.discover.outputs.domain_suffix }}
    secrets: inherit

  # ------------------------------------------------------------------
  # Job 3: Summary
  # ------------------------------------------------------------------
  summary:
    needs: [discover, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deploy summary
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch**: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment**: ${{ needs.discover.outputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Has targets**: ${{ needs.discover.outputs.has_targets }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.discover.outputs.has_targets }}" != "true" ]]; then
            echo "No projects changed. Nothing to deploy." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Projects" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo '${{ needs.discover.outputs.matrix }}' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
