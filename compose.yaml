# Auto-merged by `airis gen`. Services without `x-airis-managed: true`
# are user-owned and will not be touched on regeneration.
version: '3.8'
services:
  airis:
    image: node:22-alpine
    container_name: airis-workspace-airis
    volumes:
    - .:/app/.
    - airis-workspace-airis-dist:/app/./dist
    - airis-workspace-airis-node_modules-cache:/app/./node_modules/.cache
    - airis-workspace-.-target:/app/./target
    working_dir: /app/.
  workspace:
    image: node:22-alpine
    container_name: airis-workspace-workspace
    volumes:
    - .:/app
    - airis-workspace-pnpm-store:/root/.local/share/pnpm/store
    environment:
      NODE_ENV: development
      PNPM_HOME: /root/.local/share/pnpm
      PATH: /root/.local/share/pnpm:$PATH
    working_dir: /app
  airis-workspace:
    image: rust:1-slim
    container_name: airis-workspace-airis-workspace
    volumes:
    - .:/app/.
    - airis-workspace-airis-workspace-target:/app/./target
    - airis-workspace-airis-workspace-node-modules:/app/./node_modules
    - airis-workspace-cargo-registry:/usr/local/cargo/registry
    working_dir: /app/.
    ports:
    - 3000:3000
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    x-airis-managed: true
volumes:
  airis-workspace-pnpm-store: {}
  airis-workspace-airis-dist: {}
  airis-workspace-airis-node_modules-cache: {}
  airis-workspace-.-target: {}
  airis-workspace-root-node-modules: {}
  airis-workspace-root-pnpm-store: {}
  airis-workspace-cargo-registry: {}
  airis-workspace-root-target: {}
  airis-workspace-uv-cache: {}
  airis-workspace-root-venv: {}
  airis-workspace-root-pycache: {}
  airis-workspace-root-ruff-cache: {}
  airis-workspace-root-mypy-cache: {}
  airis-workspace-root-pytest-cache: {}
  airis-workspace-airis-workspace-target: {}
  airis-workspace-airis-workspace-node-modules: {}
  airis-workspace-airis-node-modules: {}
  airis-workspace-airis-build: {}
  airis-workspace-airis-out: {}
  airis-workspace-airis-turbo: {}
  airis-workspace-airis-cache: {}
  airis-workspace-airis-target: {}
