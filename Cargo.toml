# Cargo.toml is the source of truth for the Rust crate.
# Not regenerated by `airis gen` — edit directly.
# Sync version via `airis bump-version`.

[package]
name = "airis-workspace"
version = "3.0.8"
edition = "2024"
authors = ["kazuki <kazuki.nakai@agiletec.net>"]
description = "Docker-first monorepo workspace manager for rapid prototyping"
homepage = "https://github.com/agiletec-inc/airis-workspace"
repository = "https://github.com/agiletec-inc/airis-workspace"
license = "MIT"
keywords = ["monorepo", "docker", "workspace", "cli", "prototyping"]
categories = ["command-line-utilities", "development-tools"]

readme = "README.md"
# Do NOT exclude /templates, /hooks, /examples — files under those
# directories are embedded at compile time via include_str! and must
# ship inside the .crate, otherwise downstream builds break.
exclude = [
    "/.github",
    "/.claude",
    "/.husky",
    "/.cargo",
    "/apps",
    "/libs",
    "/node_modules",
    "/target",
    "/tests",
    "/assets",
    "/dist",
    "/docs",
    "/scripts",
    "/npm",
    # Release workflow side-effects: downloaded artifacts and checksums
    # must not be packaged into the crate when cargo publish runs in the
    # same working directory after build artifacts are fetched.
    "/artifacts",
    "/SHA256SUMS.txt",
    "**/.DS_Store",
    "/demo.tape",
    "/pnpm-lock.yaml",
    "/manifest.toml",
    "/manifest.md",
    "/compose.yml",
    "/docker-compose.yml",
    "/docker-compose.yml.md",
    "/Dockerfile",
    "/package.json",
    "/package.json.md",
    "/pnpm-workspace.yaml",
    "/pnpm-workspace.yaml.md",
    "/tsconfig.json",
    "/tsconfig.base.json",
    "/AGENTS.md",
    "/CLAUDE.md",
    "/CHANGELOG.md",
    "/CONTRIBUTING.md",
    "/DEPLOYMENT.md",
    "/PROJECT_INDEX.md",
    "/WORKSPACE.md",
]

[[bin]]
name = "airis"
path = "src/main.rs"

# Dependencies are managed manually in this file for now.
# Future: will be generated from manifest.toml [rust.dependencies]
[dependencies]
clap = { version = "4.6", features = ["derive", "cargo", "env"] }
serde = { version = "1.0", features = ["derive"] }
serde_yml = "0.0"
toml = { version = "1.1", features = ["preserve_order"] }
anyhow = "1.0"
colored = "3.1"
tokio = { version = "1.50", features = ["full"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
indexmap = { version = "2.13", features = ["serde"] }
regex = "1.12"
chrono = "0.4"
glob = "0.3"
blake3 = "1.8"
walkdir = "2.5"
ignore = "0.4"       # .gitignore handling
tempfile = "3.27"
dialoguer = "0.12"   # Interactive prompts
dirs = "6.0"         # Home directory resolution
ureq = { version = "3.3", features = ["json"] }  # Sync HTTP client for npm registry API
clap_complete = "4.6.2"
miette = { version = "7.6.0", features = ["fancy"] }
indicatif = "0.18.4"
thiserror = "2.0.18"

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/airis-{ version }-{ target }.tar.gz"
pkg-fmt = "tgz"

[package.metadata.binstall.overrides.x86_64-pc-windows-msvc]
pkg-url = "{ repo }/releases/download/v{ version }/airis-{ version }-{ target }.zip"
pkg-fmt = "zip"

[profile.release]
lto = true
codegen-units = 1
panic = 'abort'
strip = true

[dev-dependencies]
assert_cmd = "2.2"
predicates = "3.1"
tempfile = "3.27"
