# Auto-generated by airis init
# DO NOT EDIT - change manifest.toml instead.

[package]
name = "airis-monorepo"
version = "1.168.0"
edition = "2024"
authors = ["Kazuki Nakai <kazuki.nakai@agiletec.net>"]
description = "Docker-first monorepo workspace manager for rapid prototyping"
homepage = "https://github.com/agiletec-inc/airis-monorepo"
repository = "https://github.com/agiletec-inc/airis-monorepo"
license = "MIT"
keywords = ["monorepo", "docker", "workspace", "cli", "prototyping"]
categories = ["command-line-utilities", "development-tools"]

readme = "README.md"
exclude = [
    "/.github",
    "/.claude",
    "/.workspace",
    "/apps",
    "/libs",
    "/node_modules",
    "/target",
    "/tests",
    "/assets",
    "/dist",
    "/docs",
    "/scripts",
    "/npm",
    "**/.DS_Store",
    "demo.tape",
    "pnpm-lock.yaml",
    "/manifest.toml",
    "manifest.md",
    "docker-compose.yml",
    "docker-compose.yml.md",
    "Dockerfile",
    "package.json",
    "package.json.md",
    "pnpm-workspace.yaml",
    "pnpm-workspace.yaml.md",
    "AGENTS.md",
    "CLAUDE.md",
    "DEPLOYMENT.md",
    "PROJECT_INDEX.md",
    "WORKSPACE.md",
]

[[bin]]
name = "airis"
path = "src/main.rs"

# Dependencies are managed manually in this file for now.
# Future: will be generated from manifest.toml [rust.dependencies]
[dependencies]
clap = { version = "4.6", features = ["derive", "cargo", "env"] }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
toml = "1.1"
anyhow = "1.0"
colored = "3.1"
tokio = { version = "1.50", features = ["macros", "sync", "rt-multi-thread", "net"] }
serde_json = "1.0"
indexmap = { version = "2.13", features = ["serde"] }
regex = "1.12"
chrono = "0.4"
glob = "0.3"
blake3 = "1.8"
walkdir = "2.5"
ignore = "0.4"       # .gitignore handling
tempfile = "3.27"
dialoguer = "0.12"   # Interactive prompts
dirs = "6.0"         # Home directory resolution
ureq = { version = "3.3", features = ["json"] }  # Sync HTTP client for npm registry API

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/airis-{ version }-{ target }.tar.gz"
pkg-fmt = "tgz"

[package.metadata.binstall.overrides.x86_64-pc-windows-msvc]
pkg-url = "{ repo }/releases/download/v{ version }/airis-{ version }-{ target }.zip"
pkg-fmt = "zip"

[dev-dependencies]
assert_cmd = "2.2"
predicates = "3.1"
tempfile = "3.27"
